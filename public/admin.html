<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Key Library | Admin Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="icon" href="https://www.keylibrary.co.uk/cdn/shop/files/Untitled_design_-_2025-02-24T172900.986_32x32.png?v=1740418151" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body class="admin">
  <div id="loginOverlay" class="login-overlay">
    <form class="login-box" id="loginForm">
      <h1>Admin Login</h1>
      <p>Enter the admin password to continue.</p>
      <input type="password" id="passwordInput" placeholder="Password" autocomplete="current-password" required />
      <button type="submit">Sign in</button>
      <p class="message error hidden" id="loginError"></p>
    </form>
  </div>

  <div id="dashboard" class="dashboard hidden">
    <header class="admin-header">
      <div class="brand">
        <img
          src="https://www.keylibrary.co.uk/cdn/shop/files/Key-Library_logo-grey-tagline-2023_250x.png?v=1685546021"
          alt="Key Library"
          height="48"
        />
        <h1>Dashboard</h1>
      </div>
      <button type="button" id="logoutBtn" class="secondary">Logout</button>
    </header>

    <main class="admin-main">
      <section class="panel">
        <h2>Statistics</h2>
        <div class="stats-grid" id="statsGrid"></div>
      </section>

      <section class="panel">
        <h2>Customer Credits</h2>
        <form class="inline-form" id="creditForm">
          <input name="customer_id" placeholder="Shopify customer ID" required />
          <input name="email" type="email" placeholder="Email (optional)" />
          <input name="credits" type="number" min="0" placeholder="Credits" required />
          <button type="submit">Set credits</button>
        </form>
        <div class="toolbar">
          <input id="customerSearch" placeholder="Search customers…" />
          <button type="button" id="refreshCustomers" class="secondary">Refresh</button>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Customer ID</th>
                <th>Email</th>
                <th>Credits</th>
                <th>Spend left (£)</th>
                <th>Total spend (£)</th>
                <th>Updated</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="customersBody"></tbody>
          </table>
        </div>
      </section>

      <section class="panel">
        <h2>Lookup History</h2>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>When</th>
                <th>Customer</th>
                <th>VRM</th>
                <th>Cached</th>
              </tr>
            </thead>
            <tbody id="lookupsBody"></tbody>
          </table>
        </div>
      </section>

      <section class="panel">
        <h2>Cached Registrations</h2>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>VRM</th>
                <th>Fetched</th>
                <th>Age (days)</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="cacheBody"></tbody>
          </table>
        </div>
      </section>

      <section class="panel">
        <h2>CSV Export</h2>
        <div class="toolbar">
          <a class="button" href="/api/admin/export/customers">Export customers</a>
          <a class="button" href="/api/admin/export/lookups">Export lookups</a>
        </div>
      </section>
    </main>
  </div>
  <script src="/admin.js"></script>
</body>
</html>
